<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            
            /* AQUÍ ESTÁ LA IMAGEN DE FONDO */
            /* Usamos una imagen de internet de alta calidad */
background-image: url('https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?q=80&w=1920&auto=format&fit=crop');
            background-size: cover; /* Hace que la imagen cubra toda la pantalla */
            background-position: center; /* Centra la imagen */
            background-repeat: no-repeat;
        }
        
        .login-box { 
            /* AQUÍ ESTÁ EL CUADRO ALREDEDOR Y EL FONDO BLANCO */
            background: rgba(255, 255, 255, 0.92); /* Blanco con un 8% de transparencia */
            border: 4px solid #007bff; /* Borde azul grueso alrededor de la caja */
            padding: 40px; 
            border-radius: 10px; /* Esquinas redondeadas */
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); /* Sombra más fuerte para que resalte del fondo */
            width: 300px; 
            text-align: center; 
        }
        
        input { 
            width: 90%; 
            padding: 10px; 
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
        }
        button { 
            width: 100%; 
            padding: 10px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { 
            background-color: #0056b3; 
        }
        #mensaje { 
            margin-top: 15px; 
            font-weight: bold; 
        }
        h2 {
            margin-top: 0;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Iniciar Sesión</h2>
        
        <form id="formularioLogin">
            <input type="text" id="usuario" placeholder="Nombre de usuario" required>
            <input type="password" id="contrasena" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>

        <div id="mensaje"></div>
    </div>

    <script>
        document.getElementById('formularioLogin').addEventListener('submit', function(event) {
            event.preventDefault(); // Evita que la página se recargue

            const usuario = document.getElementById('usuario').value;
            const contrasena = document.getElementById('contrasena').value;
            const cajaMensaje = document.getElementById('mensaje');

            // Hacemos la validación
            if (usuario === 'admin' && contrasena === '1234') {
                window.location.href = 'portal.html';
            } else {
                cajaMensaje.style.color = 'red';
                cajaMensaje.innerHTML = 'Usuario o contraseña incorrectos.';
            }
        });
    </script>

</body>
</html>
